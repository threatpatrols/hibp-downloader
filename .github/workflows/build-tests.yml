
name: build tests

on:
  push:
    branches: [ '*' ]
    tags: [ '*' ]

jobs:

  test:
    name: "Test package"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        allow-prereleases: true

    - name: Run lint and type checks
      run: |
        uv run ruff check .
        uv run ruff format --check .
        uv run mypy src

    - name: Run tests
      run: |
        uv run pytest tests/ -vv

    - name: Build package
      run: |
        uv build --out-dir build-tester

    - name: Install the package from whl and run the application
      run: |
        uv venv tester
        uv pip install --python tester build-tester/*.whl
        tester/bin/hibp-downloader --help
