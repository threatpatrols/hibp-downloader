
name: build tests & release

on:
  push:
    branches: [ '*' ]
    tags: [ '*' ]

jobs:

  test:
    name: "Test & Lint"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        allow-prereleases: true

    - name: Run lint and type checks
      run: |
        uv run ruff check .
        uv run ruff format --check .
        uv run mypy src

    - name: Run tests
      run: |
        uv run pytest tests/ -vv

  release:
    name: "Build, Attest, & Release"
    needs: test
    # Only run this job if a tag was pushed and all tests passed
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # Required for OIDC / Sigstore attestation & PyPI publish
      attestations: write   # Required for generating and storing build provenance
      contents: write       # Required for creating/updating the GitHub Release

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"
        enable-cache: true

    - name: Build package
      run: |
        uv build --out-dir dist

    - name: Attest build provenance
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: "dist/*"

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*.whl
          dist/*.tar.gz
        generate_release_notes: true
